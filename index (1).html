<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Intense Rezepte</title>
<style>
  :root {
    --bg: #faf7f2; --card: #ffffff; --dark: #2c1810; --accent: #e8673a;
    --green: #10b981; --blue: #3b82f6; --purple: #8b5cf6; --amber: #f59e0b;
    --text: #2c1810; --muted: #888; --border: #f0e8dc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--dark); color: #f5e6d3; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .logo { font-size: 20px; font-weight: bold; letter-spacing: 1px; white-space: nowrap; }
  nav { display: flex; gap: 4px; flex-wrap: wrap; }
  .nav-btn { padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-family: Georgia, serif; background: rgba(255,255,255,0.1); color: #f5e6d3; transition: all .2s; }
  .nav-btn.active, .nav-btn:hover { background: var(--accent); }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 20px 14px; }
  .section-title { font-size: 20px; font-weight: bold; margin-bottom: 16px; color: var(--dark); border-bottom: 2px solid var(--accent); padding-bottom: 8px; }

  /* CARDS */
  .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); border: 1px solid var(--border); cursor: pointer; transition: transform .15s, box-shadow .15s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

  /* GRID */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 6px; }
  .badge-fr { background: #fef3c7; color: var(--amber); }
  .badge-mi { background: #d1fae5; color: var(--green); }
  .badge-zw { background: #ede9fe; color: var(--purple); }
  .badge-ab { background: #dbeafe; color: var(--blue); }

  /* BUTTONS */
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-family: Georgia, serif; font-weight: bold; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #d45a2e; }
  .btn-secondary { background: var(--border); color: var(--dark); }
  .btn-secondary:hover { background: #e0d4c8; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: #0ea571; }
  .btn-red { background: #ef4444; color: #fff; }
  .btn-red:hover { background: #dc2626; }
  .btn-purple { background: var(--purple); color: #fff; }
  .btn-purple:hover { background: #7c3aed; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* INPUT */
  input[type=text], input[type=number], select, textarea {
    padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd;
    font-size: 14px; font-family: Georgia, serif; width: 100%; background: #fff;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

  /* NOTIFICATION */
  .notification { position: fixed; top: 20px; right: 20px; background: var(--dark); color: #f5e6d3; padding: 12px 20px; border-radius: 10px; z-index: 9999; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: slideIn .3s ease; }
  @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* WOCHENPLAN GRID */
  .wochen-grid { display: grid; grid-template-columns: repeat(7, minmax(120px, 1fr)); gap: 6px; overflow-x: auto; padding-bottom: 8px; }
  .tag-header { font-weight: bold; font-size: 12px; text-align: center; padding: 6px 4px; background: var(--dark); color: #f5e6d3; border-radius: 6px 6px 0 0; margin-bottom: 4px; }
  .mahlzeit-slot { padding: 6px; border-radius: 8px; margin-bottom: 5px; min-height: 52px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 11px; cursor: pointer; transition: all .15s; position: relative; }
  .mahlzeit-slot.leer { border: 1.5px dashed #ccc; background: #faf7f2; color: #bbb; }
  .mahlzeit-slot.leer:hover { border-color: var(--accent); background: #fff8f5; color: var(--accent); }
  .mahlzeit-slot.belegt { border: 1.5px solid var(--accent); background: #fff8f5; }
  .mahlzeit-slot .slot-art { font-size: 9px; font-weight: bold; margin-bottom: 2px; }
  .mahlzeit-slot .slot-name { font-weight: bold; font-size: 10px; line-height: 1.3; }
  .mahlzeit-slot .slot-del { position: absolute; top: 2px; right: 3px; font-size: 10px; color: #ccc; cursor: pointer; display: none; }
  .mahlzeit-slot:hover .slot-del { display: block; }
  .mahlzeit-slot .slot-del:hover { color: #ef4444; }

  /* EINKAUFSLISTE */
  .zutat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .zutat-check { display: flex; align-items: center; gap: 10px; flex: 1; }
  .zutat-check input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
  .zutat-check label { cursor: pointer; }
  .checked-item { text-decoration: line-through; color: #aaa; }
  .zutat-menge { color: var(--accent); font-size: 12px; min-width: 80px; text-align: right; }

  /* WOCHENAUSWAHL TABS */
  .woche-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .woche-tab { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); cursor: pointer; font-size: 13px; font-family: Georgia, serif; background: #fff; color: var(--dark); transition: all .2s; }
  .woche-tab.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  /* KI PANEL */
  .ki-panel { background: linear-gradient(135deg, #1a0f0a 0%, #2c1810 100%); border-radius: 16px; padding: 24px; color: #f5e6d3; margin-bottom: 20px; }
  .ki-panel h3 { font-size: 18px; margin-bottom: 6px; color: #ffd4a8; }
  .ki-panel p { font-size: 13px; color: #c9a882; margin-bottom: 16px; line-height: 1.6; }
  .ki-options { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .ki-options label { font-size: 13px; color: #c9a882; }
  .ki-options select { width: auto; background: rgba(255,255,255,0.1); color: #f5e6d3; border: 1px solid rgba(255,255,255,0.2); }
  .ki-options select option { background: var(--dark); color: #f5e6d3; }
  .progress-bar { background: rgba(255,255,255,0.1); border-radius: 8px; height: 8px; margin-top: 12px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #ffd4a8); border-radius: 8px; transition: width .3s ease; }
  .progress-text { font-size: 12px; color: #c9a882; margin-top: 6px; }

  /* API KEY */
  .apikey-box { background: #fff8f5; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .apikey-box label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  .apikey-row { display: flex; gap: 8px; }
  .apikey-row input { font-family: monospace; font-size: 12px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin-bottom: 16px; font-size: 20px; }

  /* RECIPE PICKER */
  .picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .picker-card { padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; transition: all .15s; }
  .picker-card:hover { border-color: var(--accent); background: #fff8f5; }
  .picker-card.primary { border-color: var(--green); background: #f0fff8; }

  /* PORTIONEN */
  .portionen-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .portionen-row button { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; }
  .portionen-row button:hover { border-color: var(--accent); color: var(--accent); }

  /* EXPORT/IMPORT */
  .sync-box { background: #f0fff8; border: 1px solid #a7f3d0; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .sync-box h4 { color: var(--green); margin-bottom: 8px; font-size: 14px; }
  .sync-box p { font-size: 12px; color: #555; margin-bottom: 10px; line-height: 1.5; }

  @media (max-width: 600px) {
    .wochen-grid { grid-template-columns: repeat(4, minmax(100px, 1fr)); }
    .recipe-grid { grid-template-columns: 1fr; }
    header { padding: 10px 12px; }
    .logo { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🥗 My Intense Rezepte</div>
  <nav id="nav">
    <button class="nav-btn active" onclick="showView('rezepte')">📖 Rezepte</button>
    <button class="nav-btn" onclick="showView('wochenplan')">📅 Wochenplan</button>
    <button class="nav-btn" onclick="showView('ki')">🤖 KI-Planung</button>
    <button class="nav-btn" onclick="showView('gespeichert')">💾 Gespeichert</button>

</header>

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('myIntenseData');
    if (saved) {
      const d = JSON.parse(saved);
      state.wochenplaene = d.wochenplaene || [];
      state.einkaufslisten = d.einkaufslisten || [];
      state.apiKey = d.apiKey || '';
    }
  } catch(e) {}
}

function saveToStorage() {
  try {
    localStorage.setItem('myIntenseData', JSON.stringify({
      wochenplaene: state.wochenplaene,
      einkaufslisten: state.einkaufslisten,
      apiKey: state.apiKey,
    }));
  } catch(e) {}
}

loadFromStorage();

// UTILITIES

function notify(msg, dur=2800) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', dur);
}

function showView(v) {
  state.currentView = v;
  state.detailRezept = null;
  state.pickFor = null;
  state.showEinkaufId = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.getAttribute('onclick')?.includes(v)) b.classList.add('active');
  });
  render();
}

function closeModal(e) {
  document.getElementById('modal-overlay').style.display = 'none';
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function getRezepteByArt(art) {
  const mapped = ART_MAP[art] || art;
  return REZEPTE.filter(r => r.art === mapped && !r.name.match(/[Oo]bst-|[Ff]rucht-/));
}

function getBadgeClass(art) {
  if (art === 'Frühstück') return 'badge-fr';
  if (art === 'Mittagessen') return 'badge-mi';
  if (art === 'Abendessen') return 'badge-ab';
  return 'badge-zw';
}

function skaliere(menge, basisP, zielP) {
  if (!menge) return '';
  const n = parseFloat(menge);
  if (isNaN(n)) return menge;
  const r = n * zielP / (parseInt(basisP) || 1);
  return r % 1 === 0 ? r.toString() : r.toFixed(1);
}

function getPlanById(id) { return state.wochenplaene.find(p => p.id === id); }

function generiereEinkaufsliste(plan, wocheIdx) {
  const woche = plan.wochen[wocheIdx];
  const alle = {};
  const portionenMap = {
    'Frühstück': { wt: 5, we: 1 },
    'Snack VM':  { wt: 5, we: 1 },
    'Mittagessen':{ wt: 1, we: 1 },
    'Snack NM':  { wt: 5, we: 1 },
    'Abendessen': { wt: 1, we: 1 },
  };
  TAGE.forEach((tag, ti) => {
    const isWE = ti >= 5;
    MAHLZEITEN_KI.forEach(m => {
      const rName = woche[tag]?.[m];
      if (!rName) return;
      const r = REZEPTE.find(x => x.name === rName);
      if (!r) return;
      const portionen = isWE ? portionenMap[m].we : portionenMap[m].wt;
      r.zutaten.forEach(z => {
        if (!z.zutat) return;
        const key = z.zutat.toLowerCase().trim();
        if (!alle[key]) alle[key] = { zutat: z.zutat, mengen: [] };
        if (z.menge) {
          const basisP = parseInt(z.personen) || 1;
          const skaliert = skaliere(z.menge, basisP, portionen);
          alle[key].mengen.push(`${skaliert}${z.einheit ? ' ' + z.einheit : ''}`);
        }
      });
    });
  });
  return Object.values(alle);
}

// KI WOCHENPLAN GENERIERUNG
// ═══════════════════════════════════════════════════════
const SYSTEM_PROMPT = `Du bist ein Ernährungsplaner. Du erstellst Wochenpläne aus einer vorgegebenen Rezeptliste.

REGELN:
- Mo–Fr: Frühstück = 1 Rezept, wiederholt sich alle 5 Tage (täglich gleich)
- Mo–Fr: Snack VM = 1 Rezept, täglich identisch; Snack NM = 1 anderes Rezept, täglich identisch
- Mo–Fr Mittag und Abend: maximale Abwechslung, verschiedene Eiweißquellen (Fisch, Geflügel, Rind, vegetarisch, Milchprodukte)
- Sa + So: ALLE 5 Mahlzeiten VERSCHIEDEN vom Rest der Woche UND voneinander; aufwendigere Gerichte erlaubt
- Werktags: schnelle einfache Gerichte bevorzugt
- Keine Rezepte mit "Obst-" oder "Frucht-" im Namen
- Jede Woche soll sich von anderen Wochen unterscheiden (andere Frühstücks- und Snack-Auswahl)

PORTIONEN (nur zur Info, nicht im JSON):
- Mittag + Abend: 1 Portion
- Frühstück Mo–Fr: 5 Portionen (täglich gleich)
- Snacks Mo–Fr: 5 Portionen je Snack
- Sa + So alle Mahlzeiten: 1 Portion

Antworte NUR mit validem JSON, kein Text davor oder danach.
Format: {"Montag":{"Frühstück":"Rezeptname","Snack VM":"Rezeptname","Mittagessen":"Rezeptname","Snack NM":"Rezeptname","Abendessen":"Rezeptname"},...alle 7 Tage...}`;

async function kiGeneriereWochenplaene() {
  if (!state.apiKey) { notify('❌ Bitte zuerst den API-Key eingeben!'); return; }
  
  const anzahl = state.kiWochen;
  const rezeptNamen = REZEPTE
    .filter(r => !r.name.match(/[Oo]bst-|[Ff]rucht-/))
    .map(r => `${r.art}: ${r.name}`)
    .join('\n');
  
  state.kiGenerating = true;
  state.kiProgress = 0;
  state.kiStatus = 'Starte KI-Planung...';
  renderKiView();

  const neuePlaene = [];
  const wochenDaten = [];

  for (let i = 0; i < anzahl; i++) {
    state.kiStatus = `Erstelle Woche ${i+1} von ${anzahl}...`;
    state.kiProgress = Math.round((i / anzahl) * 90);
    renderKiView();

    const prevWochen = wochenDaten.map((w,wi) => `Woche ${wi+1}: Frühstück=${w['Montag']?.['Frühstück']}, SnackVM=${w['Montag']?.['Snack VM']}, SnackNM=${w['Montag']?.['Snack NM']}`).join(' | ');
    const userMsg = `Erstelle Woche ${i+1} von ${anzahl} Wochen.${prevWochen ? ' Bereits verwendete Wochenthemen: ' + prevWochen + '. Bitte andere Rezepte für Frühstück und Snacks wählen.' : ''}

Verfügbare Rezepte:
${rezeptNamen}`;

    // 3 Sekunden Pause ab Woche 2 (Rate Limiting vermeiden)
    if (i > 0) {
      state.kiStatus = `Kurze Pause vor Woche ${i+1} von ${anzahl}...`;
      renderKiView();
      await new Promise(r => setTimeout(r, 3000));
    }

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: userMsg }]
        })
      });

      if (!res.ok) {
        let errMsg = `HTTP ${res.status}`;
        try { const err = await res.json(); errMsg = err.error?.message || JSON.stringify(err); } catch(_) {}
        throw new Error(errMsg);
      }

      const data = await res.json();
      const text = data.content[0].text.trim();
      const clean = text.replace(/```json|```/g, '').trim();
      const woche = JSON.parse(clean);
      wochenDaten.push(woche);
    } catch(e) {
      const msg = e.message || String(e);
      notify(`Fehler bei Woche ${i+1}: ${msg}`, 8000);
      state.kiStatus = `Fehler bei Woche ${i+1}: ${msg}`;
      state.kiGenerating = false;
      renderKiView();
      return;
    }
  }

  // Plan zusammenbauen
  state.kiStatus = 'Speichere Pläne...';
  state.kiProgress = 95;
  renderKiView();

  const planName = `KI-Plan ${new Date().toLocaleDateString('de-DE')}`;
  const plan = {
    id: Date.now(),
    name: planName,
    wochen: wochenDaten,
    erstellt: new Date().toLocaleDateString('de-DE'),
  };
  state.wochenplaene.push(plan);

  // Einkaufslisten generieren
  wochenDaten.forEach((_, wIdx) => {
    const zutaten = generiereEinkaufsliste(plan, wIdx);
    state.einkaufslisten.push({
      id: Date.now() + wIdx + 1,
      planId: plan.id,
      planName: `${planName} – Woche ${wIdx+1}`,
      wocheIdx: wIdx,
      datum: new Date().toLocaleDateString('de-DE'),
      zutaten,
      checked: {},
    });
  });

  saveToStorage();
  state.kiGenerating = false;
  state.kiProgress = 100;
  state.kiStatus = `✅ ${anzahl} Wochenplan${anzahl>1?'e':''} erstellt und gespeichert!`;
  state.activePlanId = plan.id;
  renderKiView();
  notify(`🎉 ${anzahl} Wochenplan${anzahl>1?'e':''} + Einkaufslisten gespeichert!`);
}

  switch(state.currentView) {
    case 'rezepte': el.innerHTML = renderRezepte(); break;
    case 'wochenplan': el.innerHTML = renderWochenplan(); break;

    case 'gespeichert': el.innerHTML = renderGespeichert(); break;

  }
}

function neuerManuellPlan() {
  const name = prompt('Name für den neuen Wochenplan:', 'Mein Wochenplan');
  if (!name) return;
  const plan = { id: Date.now(), name, wochen: [{}], erstellt: new Date().toLocaleDateString('de-DE') };
  TAGE.forEach(t => plan.wochen[0][t] = {});
  state.wochenplaene.push(plan);
  state.activePlanId = plan.id;
  state.activeWoche = 0;
  saveToStorage();
  showView('wochenplan');
}

function pickRezept(planId, wocheIdx, tag, mahlzeit) {
  state.pickFor = { planId, wocheIdx, tag, mahlzeit };
  render();
}

function loescheSlot(planId, wocheIdx, tag, mahlzeit) {
  const plan = getPlanById(planId);
  if (!plan) return;
  if (!plan.wochen[wocheIdx]) plan.wochen[wocheIdx] = {};
  if (!plan.wochen[wocheIdx][tag]) plan.wochen[wocheIdx][tag] = {};
  delete plan.wochen[wocheIdx][tag][mahlzeit];
  saveToStorage(); render();
}

function planSpeichern() { saveToStorage(); notify('✅ Plan gespeichert!'); }

function einkaufslisteAusPlan(planId, wocheIdx) {
  const plan = getPlanById(planId);
  if (!plan) return;
  const zutaten = generiereEinkaufsliste(plan, wocheIdx);
  const liste = { id: Date.now(), planId, planName: `${plan.name} – Woche ${wocheIdx+1}`, wocheIdx, datum: new Date().toLocaleDateString('de-DE'), zutaten, checked: {} };
  state.einkaufslisten.push(liste);
  saveToStorage();
  notify('🛒 Einkaufsliste erstellt!');
  state.showEinkaufId = liste.id;
  render();
}

    ${state.einkaufslisten.map(e => `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <div>
            <div style="font-weight:bold;font-size:15px">${e.planName}</div>
            <div style="font-size:12px;color:#888">${e.datum} · ${e.zutaten.length} Zutaten · ${Object.values(e.checked||{}).filter(Boolean).length} abgehakt</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="state.showEinkaufId=${e.id};render()">Öffnen</button>
            <button class="btn btn-red btn-sm" onclick="einkaufLoeschen(${e.id})">🗑️</button>
          </div>
        </div>
      </div>`).join('')}`;
}

function einkaufLoeschen(id) {
  state.einkaufslisten = state.einkaufslisten.filter(e => e.id !== id);
  saveToStorage(); notify('🗑️ Liste gelöscht'); render();
}

function renderEinkaufslisteDetail() {
  const e = state.einkaufslisten.find(x => x.id === state.showEinkaufId);
  if (!e) return '';
  const checked = e.checked || {};
  const done = Object.values(checked).filter(Boolean).length;
  return `
    <button class="btn btn-secondary" onclick="state.showEinkaufId=null;render()" style="margin-bottom:16px">← Zurück</button>
    <h2 class="section-title">🛒 ${e.planName}</h2>
    <p style="color:#888;font-size:13px;margin-bottom:16px">${e.datum} · ${e.zutaten.length} Zutaten · ${done}/${e.zutaten.length} erledigt</p>
    <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 8px rgba(0,0,0,0.07)">
      ${e.zutaten.map((z,i) => `
        <div class="zutat-row">
          <div class="zutat-check">
            <input type="checkbox" id="cb${i}" ${checked[i]?'checked':''} onchange="toggleCheck(${e.id},${i},this.checked)">
            <label for="cb${i}" class="${checked[i]?'checked-item':''}">${z.zutat}</label>
          </div>
          ${z.mengen.length ? `<div class="zutat-menge">${z.mengen.join(', ')}</div>` : ''}
        </div>`).join('')}
    </div>`;
}

function toggleCheck(eId, idx, val) {
  const e = state.einkaufslisten.find(x => x.id === eId);
  if (!e) return;
  if (!e.checked) e.checked = {};
  e.checked[idx] = val;
  saveToStorage();
}

// ─── SYNC ────────────────────────────────────────────
function renderSync() {
  return `
    <h2 class="section-title">☁️ Sync & Backup</h2>
    <div class="sync-box">
      <h4>📤 Daten exportieren (für OneDrive / anderes Gerät)</h4>
      <p>Exportiere alle Pläne und Einkaufslisten als JSON-Datei. Speichere sie in OneDrive und importiere sie auf dem anderen Gerät.</p>
      <button class="btn btn-green" onclick="exportDaten()">📥 Exportieren (JSON)</button>
    </div>
    <div class="sync-box">
      <h4>📥 Daten importieren</h4>
      <p>Wähle eine zuvor exportierte JSON-Datei aus, um alle Pläne zu laden. Bestehende Daten werden zusammengeführt.</p>
      <input type="file" accept=".json" onchange="importDaten(this)" style="margin-top:4px">
    </div>
    <div class="card" style="cursor:default;background:#faf7f2">
      <h4 style="margin-bottom:10px;font-size:14px">💡 Workflow für Handy + PC</h4>
      <ol style="font-size:13px;line-height:2;padding-left:20px;color:#555">
        <li>Pläne erstellen / bearbeiten auf einem Gerät</li>
        <li><b>Exportieren</b> → JSON-Datei in <b>OneDrive</b> speichern</li>
        <li>Auf dem anderen Gerät die Seite öffnen → <b>Importieren</b></li>
        <li>Fertig – alle Daten synchronisiert! 🎉</li>
      </ol>
    </div>`;
}

function exportDaten() {
  const data = { wochenplaene: state.wochenplaene, einkaufslisten: state.einkaufslisten, exportiert: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `myintense_backup_${new Date().toLocaleDateString('de-DE').replace(/\./g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  notify('✅ Exportiert!');
}

function importDaten(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.wochenplaene) {
        // Merge: bestehende IDs beibehalten, neue hinzufügen
        const existingIds = new Set(state.wochenplaene.map(p => p.id));
        data.wochenplaene.forEach(p => { if (!existingIds.has(p.id)) state.wochenplaene.push(p); });
      }
      if (data.einkaufslisten) {
        const existingIds = new Set(state.einkaufslisten.map(e => e.id));
        data.einkaufslisten.forEach(e => { if (!existingIds.has(e.id)) state.einkaufslisten.push(e); });
      }
      saveToStorage();
      notify(`✅ Import erfolgreich! ${data.wochenplaene?.length||0} Pläne geladen.`);
      render();
    } catch(err) {
      notify('❌ Fehler beim Import: Ungültige Datei.', 4000);
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
